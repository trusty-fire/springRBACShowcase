debug: true

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    de.frachtwerk: DEBUG

server:
  port: 8098
  error:
    include-stacktrace: always

spring:
  h2:
    console:
      enabled: true
      settings:
        trace: false

