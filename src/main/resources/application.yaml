debug: false

logging:
  level:
    root: INFO
    org.hibernate: WARN

server:
  port: 8098
  error:
    include-message: always
    include-stacktrace: never

spring:
  profiles:
    active: development, h2
  cache:
    type: simple
  application:
    name: Essencium Application
  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        globally_quoted_identifiers: true
  freemarker:
    enabled: false

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    dispatch-trace-request: true

mail:
  host: localhost
  port: 587
  username: showcase@crafted-code.org
  password: changeme

  default-sender:
    name: Essencium Mailer
    address: showcase@crafted-code.org

  smtp:
    auth: true
    start-tls: true

  branding:
    name: ${spring.application.name}
    url: ${app.url}
    logo: https://raw.githubusercontent.com/trusty-fire/springRBACShowcase/tree/main/src/main/resources/static/logo.svg
    primary-color: "#00b5d6"
    text-color: "#ffffff"

  new-user-mail:
    subject-key: mail.new-user.subject
    template: NewUserMessage.ftl
    reset-link: setPassword?token=

  reset-token-mail:
    subject-key: mail.reset-token.subject
    template: ResetTokenMessage.ftl
    reset-link: setPassword?token=

  contact-mail:
    subject-prefix-key: mail.contact.subject.prefix
    recipients:
      - showcase@crafted-code.org
    template: ContactMessage.ftl
    locale: de

  new-login-mail:
    subject-key: mail.new-login.subject
    template: NewLoginMessage.ftl

app:
  domain: localhost
  url: http://${app.domain}:8098
  default-logout-redirect-url: "http://localhost:3000/login"
  allowed-logout-redirect-urls:
    - "http://localhost:3000/*"
  auth:
    jwt:
      access-token-expiration: 86400 # 24 hours
      refresh-token-expiration: 2592000 # 30 days
      issuer: Crafted Code
      cleanup-interval: 3600 # 1 hour
      max-session-expiration-time: 86400 # 24 hours
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - http://localhost:8098
    allowed-origin-patterns: []
    allow-credentials: true
    allowed-methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD]
    allowed-headers: ["*"]
    exposed-headers: [Authorization]
    max-age: 3600

  security:
    min-password-strength: 1
    max-failed-logins: 10

management:
  health:
    ldap:
      enabled: false
  endpoint:
    health:
      probes:
        enabled: true

pom:
  version: '@project.version@'

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

essencium:
  init:
    roles:
      - name: ADMIN
        description: Administrator
        rights:
          - ORGANIZATION_READ
          - ORGANIZATION_UPDATE
          - ORGANIZATION_DELETE
          - PROJECT_CREATE
          - PROJECT_READ
          - PROJECT_UPDATE
          - PROJECT_DELETE
          - TASK_CREATE
          - TASK_READ
          - TASK_UPDATE
          - TASK_DELETE
          - USER_CREATE
          - USER_READ
          - USER_UPDATE
          - USER_DELETE
        protected: true
        default-role: false
      - name: MANAGER
        description: Manager
        rights:
          - ORGANIZATION_READ
          - PROJECT_CREATE
          - PROJECT_READ
          - PROJECT_UPDATE
          - PROJECT_DELETE
          - TASK_CREATE
          - TASK_READ
          - TASK_UPDATE
          - TASK_DELETE
          - USER_READ
        protected: true
        default-role: false
      - name: MEMBER
        description: Member
        rights:
          - ORGANIZATION_READ
          - PROJECT_READ
          - TASK_CREATE
          - TASK_READ
          - TASK_UPDATE
          - TASK_DELETE
          - USER_READ
        protected: true
        default-role: false
      - name: VIEWER
        description: Viewer
        rights:
          - ORGANIZATION_READ
          - PROJECT_READ
          - TASK_READ
          - USER_READ
        protected: true
        default-role: true
    users:
      - first-name: Admin
        last-name: User
        username: showcaseAdmin@crafted-code.org
        password: adminAdminAdmin
        roles:
          - ADMIN
          - DEFAULT
  jpa:
    table-prefix: "CC_"
    camel-case-to-underscore: true